name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Detect Xcode version
        id: xcode
        shell: bash
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version | awk '/Xcode/{print $2}')"
          xcode_build="$(xcodebuild -version | awk '/Build version/{print $3}')"
          echo "version=${xcode_version}-${xcode_build}" >> "$GITHUB_OUTPUT"
          xcodebuild -version

      - name: Restore frameworks cache
        id: framework_cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            xcfs/.build
            xcfs/.swiftpm
            Frameworks/ios_system/xcfs/.build
          key: ${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-frameworks-${{ hashFiles('get_frameworks.sh', 'xcfs/Package.swift', 'xcfs/Package.resolved', 'Frameworks/ios_system/xcfs/Package.swift', 'Frameworks/ios_system/xcfs/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-frameworks-
            ${{ runner.os }}-frameworks-

      - name: Restore resources cache
        id: resource_cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            Resources/vim
          key: ${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-resources-${{ hashFiles('get_resources.sh', 'Resources/vim/.gitignore') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-resources-
            ${{ runner.os }}-resources-

      - name: Get frameworks
        if: steps.framework_cache.outputs.cache-hit != 'true'
        run: ./get_frameworks.sh

      - name: Get resources
        if: steps.resource_cache.outputs.cache-hit != 'true'
        run: ./get_resources.sh

      - name: Copy xcconfig
        run: cp template_setup.xcconfig developer_setup.xcconfig

      - name: BlinkTests
        run: xcodebuild -project Blink.xcodeproj -scheme BlinkTests -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPad Air (5th generation)' test | xcpretty
