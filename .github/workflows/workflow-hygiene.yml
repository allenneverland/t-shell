name: Workflow Hygiene

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
  push:
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint workflow files
        # Keep this gate strict: actionlint + shellcheck findings should block merges.
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

  deprecated-actions-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Block deprecated action versions
        shell: bash
        run: |
          set -euo pipefail

          disallowed_pattern='actions/cache@v(1|2)|actions/checkout@v(1|2|3)'
          if grep -R -nE --include='*.yml' --include='*.yaml' "$disallowed_pattern" .github/workflows; then
            echo "::error title=Deprecated Actions::Found deprecated action versions. Use actions/cache@v4+ and actions/checkout@v4+."
            exit 1
          fi
