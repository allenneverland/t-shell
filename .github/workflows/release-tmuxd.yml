name: Release tmuxd

on:
  push:
    tags:
      - "tmuxd-v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64-gnu
            apt_packages: "tmux"
          - runner: macos-14
            target: aarch64-apple-darwin
            platform: darwin-aarch64
            apt_packages: ""

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && matrix.apt_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Configure cross linker
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            {
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
              echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
              echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar"
            } >> "$GITHUB_ENV"
          fi
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            {
              echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc"
              echo "CC_x86_64_unknown_linux_musl=musl-gcc"
            } >> "$GITHUB_ENV"
          fi

      - name: Run tmux hook integration tests
        if: runner.os == 'Linux'
        working-directory: vendor/reattach
        env:
          TMUXD_REQUIRE_TMUX_INTEGRATION: "1"
        run: cargo test --package tmuxd tmux_generated_hook_command_sets_cleanly

      - name: Build tmuxd
        working-directory: vendor/reattach
        run: cargo build --release --package tmuxd --target "${{ matrix.target }}"

      - name: Package binary
        working-directory: vendor/reattach
        run: |
          cp "target/${{ matrix.target }}/release/tmuxd" tmuxd
          chmod +x tmuxd
          tar -czf "tmuxd-${{ matrix.platform }}.tar.gz" tmuxd
          shasum -a 256 "tmuxd-${{ matrix.platform }}.tar.gz" > "tmuxd-${{ matrix.platform }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tmuxd-${{ matrix.platform }}
          path: |
            vendor/reattach/tmuxd-${{ matrix.platform }}.tar.gz
            vendor/reattach/tmuxd-${{ matrix.platform }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: tmuxd-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tmuxd-*.tar.gz
            dist/tmuxd-*.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
